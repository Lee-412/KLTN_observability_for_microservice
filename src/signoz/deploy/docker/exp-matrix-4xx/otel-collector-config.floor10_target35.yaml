connectors:
  signozmeter:
    metrics_flush_interval: 1h
    dimensions:
      - name: service.name
      - name: deployment.environment
      - name: host.name
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      global:
        scrape_interval: 60s
      scrape_configs:
        - job_name: otel-collector
          static_configs:
          - targets:
              - localhost:8888
            labels:
              job_name: otel-collector
processors:
  batch:
    send_batch_size: 10000
    send_batch_max_size: 11000
    timeout: 10s
  batch/meter:
    send_batch_max_size: 25000
    send_batch_size: 20000
    timeout: 1s
  resourcedetection:
    detectors: [env, system]
    timeout: 2s
  signozspanmetrics/delta:
    metrics_exporter: signozclickhousemetrics
    metrics_flush_interval: 60s
    latency_histogram_buckets: [100us, 1ms, 2ms, 6ms, 10ms, 50ms, 100ms, 250ms, 500ms, 1000ms, 1400ms, 2000ms, 5s, 10s, 20s, 40s, 60s ]
    dimensions_cache_size: 100000
    aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
    enable_exp_histogram: true
    dimensions:
      - name: service.namespace
        default: default
      - name: deployment.environment
        default: default
      - name: signoz.collector.id
      - name: service.version
      - name: browser.platform
      - name: browser.mobile
      - name: k8s.cluster.name
      - name: k8s.node.name
      - name: k8s.namespace.name
      - name: host.name
      - name: host.type
      - name: container.name
  signoz_tail_sampling:
    decision_wait: 8s
    num_traces: 50000
    expected_new_traces_per_sec: 100
    policies:
      - name: error-first-override
        type: policy_group
        priority: 1
        policy_filter:
          filter_op: or
          numeric_attributes:
            - key: http.status_code
              min_value: 500
              max_value: 999
        sampling:
          sampling_percentage: 100

      - name: error-critical-4xx-override
        type: policy_group
        priority: 2
        policy_filter:
          filter_op: or
          numeric_attributes:
            - key: http.status_code
              min_value: 408
              max_value: 408
            - key: http.status_code
              min_value: 429
              max_value: 429
            - key: http.status_code
              min_value: 499
              max_value: 499
        sampling:
          sampling_percentage: 100

      - name: error-important-4xx-floor
        type: policy_group
        priority: 3
        policy_filter:
          filter_op: or
          numeric_attributes:
            - key: http.status_code
              min_value: 409
              max_value: 409
            - key: http.status_code
              min_value: 423
              max_value: 423
        sampling:
          sampling_percentage: 70

      - name: critical-endpoint-floor-checkout
        type: policy_group
        priority: 4
        policy_filter:
          filter_op: or
          string_attributes:
            - key: http.route
              values: ["/checkout", "/api/checkout", "/orders", "/api/orders"]
            - key: http.target
              values: ["/checkout", "/api/checkout", "/orders", "/api/orders"]
        sampling:
          sampling_percentage: 10

      - name: critical-endpoint-floor-payment
        type: policy_group
        priority: 5
        policy_filter:
          filter_op: or
          string_attributes:
            - key: http.route
              values: ["/payment", "/api/payment", "/pay", "/api/pay"]
            - key: http.target
              values: ["/payment", "/api/payment", "/pay", "/api/pay"]
        sampling:
          sampling_percentage: 8

      - name: adaptive-model-policy
        type: model
        priority: 10
        model:
          type: linear
          threshold: 5.0
          intercept: 0.0
          weights:
            duration_ms: 0.01
            span_count: 0.5
            has_error: 10.0
          adaptive:
            enabled: true
            window_duration: 30s
            dual_window:
              enabled: true
              short_window_duration: 5s
              long_window_duration: 30s
              alpha_normal: 0.35
              alpha_incident: 0.75
            recompute_interval: 5s
            max_samples: 10000
            target_traces_per_sec: 35
            min_keep_ratio: 0.05
            max_keep_ratio: 1.0
            always_keep_errors: true
            sla_duration_ms: 2000
            violation_rate_threshold: 0.05
            incident_keep_ratio: 0.7
            state_aware:
              enabled: true
              error_burst_threshold: 0.20
              error_burst_boost: 0.20
              latency_tail_quantile: 0.99
              latency_tail_threshold_ms: 300
              latency_tail_boost: 0.10
extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
exporters:
  clickhousetraces:
    datasource: tcp://clickhouse:9000/signoz_traces
    low_cardinal_exception_grouping: ${env:LOW_CARDINAL_EXCEPTION_GROUPING}
    use_new_schema: true
  signozclickhousemetrics:
    dsn: tcp://clickhouse:9000/signoz_metrics
  clickhouselogsexporter:
    dsn: tcp://clickhouse:9000/signoz_logs
    timeout: 10s
    use_new_schema: true
  signozclickhousemeter:
    dsn: tcp://clickhouse:9000/signoz_meter
    timeout: 45s
    sending_queue:
      enabled: false
  file/traces:
    path: /var/signoz/otel-export/traces.model.json
service:
  telemetry:
    logs:
      level: debug
      encoding: json
  extensions:
    - health_check
    - pprof
  pipelines:
    traces:
      receivers: [otlp]
      processors: [signoz_tail_sampling, signozspanmetrics/delta, batch]
      exporters: [clickhousetraces, signozmeter, file/traces]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [signozclickhousemetrics, signozmeter]
    metrics/prometheus:
      receivers: [prometheus]
      processors: [batch]
      exporters: [signozclickhousemetrics, signozmeter]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouselogsexporter, signozmeter]
    metrics/meter:
      receivers: [signozmeter]
      processors: [batch/meter]
      exporters: [signozclickhousemeter]
