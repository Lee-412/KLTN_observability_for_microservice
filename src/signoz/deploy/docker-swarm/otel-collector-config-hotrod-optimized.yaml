connectors:
  signozmeter:
    metrics_flush_interval: 1h
    dimensions:
      - name: service.name
      - name: deployment.environment
      - name: host.name
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      global:
        scrape_interval: 60s
      scrape_configs:
        - job_name: otel-collector
          static_configs:
          - targets:
              - localhost:8888
            labels:
              job_name: otel-collector
processors:
  batch:
    send_batch_size: 10000
    send_batch_max_size: 11000
    timeout: 10s
  batch/meter:
    send_batch_max_size: 25000
    send_batch_size: 20000
    timeout: 1s
  resourcedetection:
    detectors: [env, system]
    timeout: 2s
  signozspanmetrics/delta:
    metrics_exporter: signozclickhousemetrics
    metrics_flush_interval: 60s
    latency_histogram_buckets: [100us, 1ms, 2ms, 6ms, 10ms, 50ms, 100ms, 250ms, 500ms, 1000ms, 1400ms, 2000ms, 5s, 10s, 20s, 40s, 60s ]
    dimensions_cache_size: 100000
    aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
    enable_exp_histogram: true
    dimensions:
      - name: service.namespace
        default: default
      - name: deployment.environment
        default: default
      - name: signoz.collector.id
      - name: service.version
      - name: browser.platform
      - name: browser.mobile
      - name: k8s.cluster.name
      - name: k8s.node.name
      - name: k8s.namespace.name
      - name: host.name
      - name: host.type
      - name: container.name
  
  # OPTIMIZED FOR HOTROD: Adaptive Linear Model Sampling
  signoz_tail_sampling:
    decision_wait: 5s
    num_traces: 50000
    expected_new_traces_per_sec: 100
    policies:
      - name: adaptive-hotrod-optimized
        type: model
        model:
          type: linear
          # High fallback threshold - only keep slow/complex requests
          threshold: 50.0
          intercept: 0.0
          
          # INCREASED WEIGHTS for better score separation
          weights:
            # 0.1 instead of 0.01 → 10x impact
            # Now: 200ms = +20 score, 500ms = +50 score
            duration_ms: 0.1
            
            # 1.0 instead of 0.5 → 2x impact  
            # Now: 10 spans = +10 score
            span_count: 1.0
            
            # 100.0 instead of 10.0 → 10x impact
            # Errors get VERY high scores, always kept
            has_error: 100.0
          
          adaptive:
            enabled: true
            
            # Windows and recompute
            window_duration: 30s
            recompute_interval: 10s
            max_samples: 5000
            
            # AGGRESSIVE TARGET: Force dropping
            # If Hotrod generates 100 traces/sec, this keeps only 20/sec
            target_traces_per_sec: 20
            
            # Safety bounds
            min_keep_ratio: 0.1    # Always keep at least 10%
            max_keep_ratio: 0.8    # Never keep more than 80%
            
            # Errors always kept regardless of score
            always_keep_errors: true
            
            # Optional: SLA incident detection
            sla_duration_ms: 1000         # > 1s is slow
            violation_rate_threshold: 0.1 # >10% slow requests = incident
            incident_keep_ratio: 0.5      # Boost to 50% during incidents

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
exporters:
  clickhousetraces:
    datasource: tcp://clickhouse:9000/signoz_traces
    low_cardinal_exception_grouping: ${env:LOW_CARDINAL_EXCEPTION_GROUPING}
    use_new_schema: true
  signozclickhousemetrics:
    dsn: tcp://clickhouse:9000/signoz_metrics
  clickhouselogsexporter:
    dsn: tcp://clickhouse:9000/signoz_logs
    timeout: 10s
    use_new_schema: true
  signozclickhousemeter:
    dsn: tcp://clickhouse:9000/signoz_meter
    timeout: 45s
    sending_queue:
      enabled: false

service:
  telemetry:
    logs:
      level: debug  # IMPORTANT: See adaptive recompute logs
      encoding: json
  extensions:
    - health_check
    - pprof
  pipelines:
    traces:
      receivers: [otlp]
      processors: [signoz_tail_sampling, signozspanmetrics/delta, batch]
      exporters: [clickhousetraces, signozmeter]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [signozclickhousemetrics, signozmeter]
    metrics/prometheus:
      receivers: [prometheus]
      processors: [batch]
      exporters: [signozclickhousemetrics, signozmeter]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouselogsexporter, signozmeter]
    metrics/meter:
      receivers: [signozmeter]
      processors: [batch/meter]
      exporters: [signozclickhousemeter]
